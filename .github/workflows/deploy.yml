name: Deploy to Server

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  SSH_HOST: 72.62.227.188
  SSH_USER: root
  DEPLOY_PATH: /var/www/html/leadgen
  APP_NAME: leadgen

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies and build
        run: |
          export DATABASE_URL="${DATABASE_URL:-postgresql://postgres:postgres@127.0.0.1:5432/ai_sales_agent}"
          export APP_SECRET="${APP_SECRET:-ci-build-placeholder-secret-32chars}"
          export OPENAI_API_KEY="${OPENAI_API_KEY:-sk-build-placeholder}"
          npm install -g npm@10.9.2
          npm ci
          npx prisma generate
          npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Install rsync and sshpass
        run: sudo apt-get update && sudo apt-get install -y rsync sshpass

      - name: Prepare server directory
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no \
            ${{ env.SSH_USER }}@${{ env.SSH_HOST }} \
            "mkdir -p ${{ env.DEPLOY_PATH }}"

      - name: Sync files to Ubuntu server
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            --exclude node_modules \
            --exclude .git \
            --exclude .env \
            --exclude .env.local \
            ./ ${{ env.SSH_USER }}@${{ env.SSH_HOST }}:${{ env.DEPLOY_PATH }}/

      - name: Verify synced files on server
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no \
            ${{ env.SSH_USER }}@${{ env.SSH_HOST }} \
            "ls -la ${{ env.DEPLOY_PATH }}/src/components/AppShell.tsx ${{ env.DEPLOY_PATH }}/tsconfig.json ${{ env.DEPLOY_PATH }}/.next/BUILD_ID"

      - name: Install dependencies and restart application
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
          APP_NAME: ${{ env.APP_NAME }}
          NODE_VERSION: ${{ env.NODE_VERSION }}
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          envs: DEPLOY_PATH,APP_NAME,NODE_VERSION
          script_stop: true
          timeout: 30m
          script: |
            set -euo pipefail
            cd "$DEPLOY_PATH"
            chmod +x scripts/deploy-remote.sh
            APP_NAME="$APP_NAME" NODE_VERSION="$NODE_VERSION" ./scripts/deploy-remote.sh
